<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Gape Handsome</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           GAYA TAMPILAN (CSS)
           ========================================= */
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b2b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-1: #00f2fe;
            --accent-2: #4facfe;
            --accent-3: #a855f7;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.08), transparent 25%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 80px 20px 30px;
        }

        header h1 {
            margin: 0;
            font-size: 3.5em;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--accent-1), var(--accent-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 10px 20px rgba(0, 0, 0, 0.5);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2em;
            margin-top: 10px;
        }

        /* =========================================
           TOMBOL SOSIAL MEDIA
           ========================================= */
        .social-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
            text-decoration: none;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: fill 0.3s ease;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Warna khusus saat di-hover */
        .social-btn.discord:hover {
            border-color: #5865F2;
            color: #5865F2;
            box-shadow: 0 5px 20px rgba(88, 101, 242, 0.3);
        }

        .social-btn.instagram:hover {
            border-color: #E1306C;
            color: #E1306C;
            box-shadow: 0 5px 20px rgba(225, 48, 108, 0.3);
        }

        /* Filter Tombol */
        .filter-container {
            text-align: center;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid #334155;
            padding: 10px 25px;
            font-size: 1em;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            color: var(--text-main);
            border-color: var(--accent-2);
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
        }

        .filter-btn.active {
            color: var(--text-main);
            border-color: var(--accent-1);
            background: rgba(0, 242, 254, 0.1);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        /* Grid Galeri */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 20px 40px 80px;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Kartu Karya + Animasi Pop Up Masuk */
        .item {
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            animation: itemPopUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes itemPopUp {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .media-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .item img, .item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .item:hover img, .item:hover video {
            transform: scale(1.08);
        }

        .item-info {
            padding: 20px;
            position: relative;
            z-index: 2;
            background: linear-gradient(to top, var(--card-bg) 80%, transparent);
        }

        .item-info h3 {
            margin: 0 0 8px 0;
            font-size: 1.3em;
            font-weight: 600;
        }

        .item-category {
            display: inline-block;
            color: var(--accent-1);
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            pointer-events: none;
            opacity: 0.8;
        }

        /* Sistem Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(7, 10, 19, 0.95);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.show {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 85%;
            max-height: 85vh;
            position: relative;
            transform: scale(0.5);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .lightbox.show .lightbox-content {
            transform: scale(1);
        }

        .lightbox img, .lightbox video {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.25);
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: var(--text-main);
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: var(--accent-1);
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2.5em; }
            .gallery { padding: 20px; grid-template-columns: 1fr; }
            .lightbox-content { max-width: 95%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Portofolio Kreatif</h1>
        <p>Gatau Bikin Art, Minecraft Thumbnail, dan Motion Graphics?
        Order Di Gape AJA!</p>
        
        <div class="social-container">
            <a href="https://discord.com/users/syasnotfound" target="_blank" class="social-btn discord">

                </svg>
                InstagramKu
            </a>
        </div>
    </header>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterGaleri('Semua')">Semua</button>
        <button class="filter-btn" onclick="filterGaleri('Art')">Art</button>
        <button class="filter-btn" onclick="filterGaleri('Minecraft Thumbnail')">Minecraft Thumbnail</button>
        <button class="filter-btn" onclick="filterGaleri('Motion Graphic')">Motion Graphic</button>
    </div>

    <div class="gallery" id="gallery-container">
        </div>

    <div id="lightbox" class="lightbox" onclick="tutupKarya()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="tutupKarya()">&times;</span>
            <img id="lightbox-img" src="" style="display: none;">
            <video id="lightbox-video" controls src="" style="display: none;"></video>
        </div>
    </div>

    <script>
        // ==========================================
        // AREA PENGATURAN PORTOFOLIO (EDIT DI SINI)
        // ==========================================
        const daftarKarya = [
            {
                judul: "Karakter Pedang Stellar",
                kategori: "Art",
                tipe: "image", 
                file: "art1.jpg" 
            },
            {
                judul: "Dungeon Tersembunyi",
                kategori: "Minecraft Thumbnail", 
                tipe: "image",
                file: "thumb1.png"
            },
            {
                judul: "Animasi Intro Logo",
                kategori: "Motion Graphic",
                tipe: "video",
                file: "intro.mp4"
            }
        ];

        // ==========================================
        // SISTEM OTOMATIS (JANGAN DIUBAH)
        // ==========================================
        const galleryContainer = document.getElementById('gallery-container');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxVideo = document.getElementById('lightbox-video');

        function tampilkanKarya(kategoriFilter) {
            galleryContainer.innerHTML = ''; 
            
            const karyaDifilter = kategoriFilter === 'Semua' 
                ? daftarKarya 
                : daftarKarya.filter(karya => karya.kategori === kategoriFilter);

            karyaDifilter.forEach((karya, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item';
                itemDiv.style.animationDelay = `${index * 0.05}s`;
                
                let mediaHTML = '';
                let iconHTML = '';

                if (karya.tipe === 'video') {
                    mediaHTML = `<video muted loop onmouseover="this.play()" onmouseout="this.pause()"><source src="${karya.file}" type="video/mp4"></video>`;
                    iconHTML = `<div class="play-icon">▶</div>`;
                } else {
                    mediaHTML = `<img src="${karya.file}" alt="${karya.judul}">`;
                }

                itemDiv.innerHTML = `
                    <div class="media-container" onclick="perbesarKarya('${karya.file}', '${karya.tipe}')">
                        ${mediaHTML}
                        ${karya.tipe === 'video' ? iconHTML : ''}
                    </div>
                    <div class="item-info">
                        <h3>${karya.judul}</h3>
                        <span class="item-category">${karya.kategori}</span>
                    </div>
                `;
                galleryContainer.appendChild(itemDiv);
            });
        }

        function filterGaleri(kategori) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            tampilkanKarya(kategori);
        }

        function perbesarKarya(fileSrc, tipe) {
            if (tipe === 'video') {
                lightboxImg.style.display = 'none';
                lightboxVideo.src = fileSrc;
                lightboxVideo.style.display = 'block';
                lightboxVideo.play();
            } else {
                lightboxVideo.style.display = 'none';
                lightboxVideo.pause();
                lightboxImg.src = fileSrc;
                lightboxImg.style.display = 'block';
            }
            lightbox.classList.add('show');
        }

        function tutupKarya() {
            lightbox.classList.remove('show');
            setTimeout(() => {
                lightboxVideo.pause();
                lightboxVideo.src = '';
                lightboxImg.src = '';
            }, 300);
        }

        tampilkanKarya('Semua');
    </script>
</body>
</html>
